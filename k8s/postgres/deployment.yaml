apiVersion: apps/v1
kind: Deployment
metadata:
  name: postgres
  namespace: taskflow
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels: { app: postgres }
  template:
    metadata:
      labels: { app: postgres }
    spec:
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports: [{ containerPort: 5432 }]
          env:
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: taskflow-secrets, key: POSTGRES_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: taskflow-secrets, key: POSTGRES_PASSWORD } }
          volumeMounts:
            - name: init-script
              mountPath: /docker-entrypoint-initdb.d
          readinessProbe:
            exec: { command: ["pg_isready", "-U", "taskflow"] }
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            requests: { memory: "128Mi", cpu: "100m" }
            limits: { memory: "256Mi", cpu: "500m" }
      volumes:
        - name: init-script
          configMap: { name: postgres-init }
