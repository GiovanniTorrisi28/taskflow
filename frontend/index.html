<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TaskFlow — Accedi</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <div class="auth-card">
    <h2 id="form-title">Accedi a TaskFlow</h2>
    <div class="error-message" id="error-message"></div>

    <form id="login-form">
      <input type="text" id="login-username" placeholder="Username" required />
      <input type="password" id="login-password" placeholder="Password" required />
      <button type="submit" style="width: 100%">Accedi</button>
    </form>

    <form id="register-form" style="display: none">
      <input type="text" id="register-username" placeholder="Username" required />
      <input type="email" id="register-email" placeholder="Email" required />
      <input type="password" id="register-password" placeholder="Password" required />
      <button type="submit" style="width: 100%">Registrati</button>
    </form>

    <div class="auth-toggle">
      <a href="#" id="toggle-link">Non hai un account? Registrati</a>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script src="/js/login.js"></script>
</body>
</html>
