server {
    listen 80;

    root /usr/share/nginx/html;
    index index.html;

    # risolutore DNS interno di Docker, con TTL basso: senza questo nginx risolverebbe
    # gli hostname degli upstream una sola volta all'avvio e continuerebbe a usare
    # l'IP anche dopo che un container viene ricreato (es. `docker compose up --build`).
    resolver 127.0.0.11 valid=10s;

    location / {
        try_files $uri $uri/ =404;
    }

    # nota: "set" deve stare PRIMA di "rewrite ... break", perché break interrompe
    # l'esecuzione delle direttive successive del modulo rewrite nello stesso blocco.
    location ~ ^/api/auth/(.*)$ {
        set $upstream http://user-service:5000;
        rewrite ^/api/auth/(.*)$ /$1 break;
        proxy_pass $upstream;
    }

    location ~ ^/api/users/(.*)$ {
        set $upstream http://user-service:5000;
        rewrite ^/api/users/(.*)$ /users/$1 break;
        proxy_pass $upstream;
    }

    location ~ ^/api/projects(.*)$ {
        set $upstream http://project-service:5000;
        rewrite ^/api/projects(.*)$ /projects$1 break;
        proxy_pass $upstream;
    }

    location ~ ^/api/tasks(.*)$ {
        set $upstream http://project-service:5000;
        rewrite ^/api/tasks(.*)$ /tasks$1 break;
        proxy_pass $upstream;
    }

    location ~ ^/api/activities(.*)$ {
        set $upstream http://activity-service:5000;
        rewrite ^/api/activities(.*)$ /activities$1 break;
        proxy_pass $upstream;
    }

    location ~ ^/api/comments(.*)$ {
        set $upstream http://activity-service:5000;
        rewrite ^/api/comments(.*)$ /comments$1 break;
        proxy_pass $upstream;
    }
}
