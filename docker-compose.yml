services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: taskflow
      POSTGRES_PASSWORD: taskflow
    volumes:
      - ./infra/local/init-postgres.sql:/docker-entrypoint-initdb.d/init.sql
      - postgres-data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskflow"]
      interval: 5s
      timeout: 5s
      retries: 10

  user-service:
    build: ./services/user-service
    environment:
      DATABASE_URL: postgresql://taskflow:taskflow@postgres:5432/users_db
      JWT_SECRET: dev-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5001:5000"

  project-service:
    build: ./services/project-service
    environment:
      DATABASE_URL: postgresql://taskflow:taskflow@postgres:5432/projects_db
      JWT_SECRET: dev-secret-change-me
      ACTIVITY_SERVICE_URL: http://activity-service:5000
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5002:5000"

  activity-service:
    build: ./services/activity-service
    environment:
      DATABASE_URL: postgresql://taskflow:taskflow@postgres:5432/activities_db
      JWT_SECRET: dev-secret-change-me
    depends_on:
      postgres:
        condition: service_healthy
    ports:
      - "5003:5000"

  frontend:
    build: ./frontend
    ports:
      - "8080:80"
    depends_on:
      - user-service
      - project-service
      - activity-service

volumes:
  postgres-data:
