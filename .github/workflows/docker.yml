name: Docker Build & Push

on:
  push:
    branches: [main]
    paths:
      - 'services/**'
      - 'frontend/**'
      - '.github/workflows/docker.yml'

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, project-service, activity-service]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - working-directory: services/${{ matrix.service }}
        run: pip install -r requirements-dev.txt

      - working-directory: services/${{ matrix.service }}
        run: pytest -q

  build-and-push:
    runs-on: ubuntu-latest
    needs: test                    # parte solo se tutti i test sono passati

    strategy:
      matrix:
        include:
          - name: user-service
            context: services/user-service
          - name: project-service
            context: services/project-service
          - name: activity-service
            context: services/activity-service
          - name: frontend
            context: frontend

    steps:
      - uses: actions/checkout@v4

      - name: Login su Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build e Push ${{ matrix.name }}
        uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.context }}
          push: true
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.name }}:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/taskflow-${{ matrix.name }}:${{ github.sha }}
