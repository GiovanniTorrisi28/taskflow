name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        service: [user-service, project-service, activity-service]

    steps:
      - name: Checkout codice
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installa dipendenze
        working-directory: services/${{ matrix.service }}
        run: pip install -r requirements-dev.txt

      - name: Esegui test
        working-directory: services/${{ matrix.service }}
        run: pytest -q
