---
# Play 1 — Installa k3s server sul master
- name: Installa k3s server sul master
  hosts: master
  become: true

  tasks:
    - name: Installa k3s server (Traefik incluso come ingress controller di default)
      shell: >
        curl -sfL https://get.k3s.io |
        INSTALL_K3S_EXEC='--disable metrics-server --disable local-storage'
        sh -
      args:
        # idempotente: non riesegue se k3s è già installato
        creates: /usr/local/bin/k3s

    - name: Attendi che k3s sia pronto
      wait_for:
        path: /var/lib/rancher/k3s/server/node-token
        timeout: 60

    - name: Leggi il token del cluster
      slurp:
        src: /var/lib/rancher/k3s/server/node-token
      register: k3s_token_raw

    - name: Salva il token come variabile
      set_fact:
        k3s_token: "{{ k3s_token_raw.content | b64decode | trim }}"

# Play 2 — Installa k3s agent sui worker
- name: Installa k3s agent sui worker
  hosts: workers
  become: true

  tasks:
    - name: Installa k3s agent e connetti al master (via IP privato, stabile dentro la VPC)
      shell: >
        curl -sfL https://get.k3s.io |
        K3S_URL=https://{{ hostvars[groups['master'][0]]['k3s_private_ip'] }}:6443
        K3S_TOKEN={{ hostvars[groups['master'][0]]['k3s_token'] }}
        sh -
      args:
        creates: /usr/local/bin/k3s

# Play 3 — Verifica il cluster
- name: Verifica lo stato del cluster
  hosts: master
  become: true

  tasks:
    - name: Attendi che tutti i nodi siano Ready
      shell: kubectl get nodes --no-headers | grep -c "Ready"
      register: ready_nodes
      until: ready_nodes.stdout | int == groups['cluster'] | length
      retries: 10
      delay: 15
      changed_when: false

    - name: Mostra lo stato del cluster
      command: kubectl get nodes
      register: cluster_status
      changed_when: false

    - name: Output
      debug:
        msg: "{{ cluster_status.stdout_lines }}"
