[master]
taskflow-master ansible_host=<MASTER_PUBLIC_IP> k3s_private_ip=<MASTER_PRIVATE_IP>

[workers]
taskflow-worker1 ansible_host=<WORKER1_PUBLIC_IP>
taskflow-worker2 ansible_host=<WORKER2_PUBLIC_IP>

[cluster:children]
master
workers

[cluster:vars]
ansible_user=ubuntu
ansible_private_key_file=~/.ssh/aws-learning-key.pem
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
rds_address=<RDS_ADDRESS>
db_username=taskflow
db_password=<DB_PASSWORD>
