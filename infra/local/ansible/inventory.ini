[master]
taskflow-master ansible_host=<MASTER_IP> static_ip=<MASTER_IP>

[workers]
taskflow-worker1 ansible_host=<WORKER1_IP> static_ip=<WORKER1_IP>
taskflow-worker2 ansible_host=<WORKER2_IP> static_ip=<WORKER2_IP>

[cluster:children]
master
workers

[cluster:vars]
ansible_user=ubuntu
ansible_private_key_file=~/.ssh/ansible_key
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
gateway=192.168.1.1
